<script>

let currentWordString = "";
let foundWords = [];

let coins = 0;

let globalRows = 0, globalCols = 0;

let isLevelComplete = false;

// ── SÖZLÜK ─────────────────────────────────────────────────────────────────────
const tdkDictionary = {

    "KALEM":"Yazı yazmaya yarayan araç.","ALEM":"Evren, dünya.","ELMA":"Kırmızı veya yeşil, tatlı, sert meyve.",
    "ZEYTİN":"Kahvaltılarda yenen yağlı ve çekirdekli meyve.","NİYET":"Bir şeyi yapmayı önceden düşünme.","YENİ":"Kullanılmamış, yeni yapılmış.","YETİ":"Bir işi yapabilme gücü.","İYİ":"Kötü olmayan.",

    "MANTIK":"Doğru düşünme kuralı ve bilimi.","MANTI":"Hamur yemeği.","TANI":"Teşhis.","KATI":"Sert madde.","ATIK":"Çöp.","KAN":"Hayati kırmızı sıvı.","TIK":"Hafif vurma sesi.",
    "PENCERE":"Işık ve hava girmesini sağlayan camlı açıklık.","CEREN":"Ceylan.","PEÇE":"Yüz örtüsü.","NEM":"Rutubet.","CEP":"Giysi torbası."

// ── SES ────────────────────────────────────────────────────────────────────────
let audioCtx;
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playTone(freq, type, duration, vol = 0.1, slideDown = false) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (slideDown) osc.frequency.exponentialRampToValueAtTime(freq * 0.5, audioCtx.currentTime + duration);
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
}
function playSelectSound(i) { const s=[523.25,587.33,659.25,783.99,880.00,1046.50]; playTone(s[(i-1)%s.length],'sine',0.4,0.12); }
function playCorrectSound() { [0,60,120,180].forEach((d,i)=>setTimeout(()=>playTone([523.25,659.25,783.99,1046.50][i],'sine',0.4,0.15),d)); }
function playWrongSound() { playTone(350,'sine',0.3,0.2,true); setTimeout(()=>playTone(250,'sine',0.3,0.2,true),100); }
function playTileLandSound() { playTone(880,'sine',0.12,0.07); }

// ── DÜZELTME: Wheel harfleri hesaplaması ──────────────────────────────────────
// Her kelimede bir harf en fazla kaç kez geçiyorsa o kadar harf wheel'e eklenir.
// Örnek: ZEYTİN (1×İ) + İYİ (2×İ) → wheel'de 2×İ olmalı.
function computeRequiredLetters(words) {
    let maxNeeded = {};
    words.forEach(word => {
        let count = {};
        word.split("").forEach(ch => { count[ch] = (count[ch] || 0) + 1; });
        Object.entries(count).forEach(([ch, n]) => { maxNeeded[ch] = Math.max(maxNeeded[ch] || 0, n); });
    });
    return Object.entries(maxNeeded).flatMap(([ch, n]) => Array(n).fill(ch));
}

// ── LEVEL VERİSİ ──────────────────────────────────────────────────────────────
const rawLevels = [
    "BİLİM,İLİM,BİL","DENİZ,DİN,DİZ","GÜNEŞ,GÜN,ŞEN","DOĞA,DAĞ,ODA","ÇİÇEK,ÇEK,İÇE","HEDİYE,YEDİ,DİYE",
    "ORMAN,ORAN,ROMA,NORM","SABIR,ASIR,SARI,SIR","KİRAZ,İKAZ,KİR,KAR","BAHAR,HARA,BAR,RAB","EKMEK,EMEK,KEM,KEK",
    "ÇİLEK,İLKE,ÇİL,KEL,İLK","KALEM,ALEM,ELMA,KEL,KEM","ZEYTİN,NİYET,YENİ,YETİ,İYİ","TAVUK,KAV,KAT,TAK,KUT",
    "YAZAR,AYAZ,YARA,YAZ,ZAR,RAY","KLAVYE,ALEV,VALE,YEL,LAV,EVLA","SİSTEM,SİTE,SES,SİS,SEM,SET",
    "MANTIK,MANTI,TANI,KATI,ATIK,KAN,TIK","PENCERE,CEREN,PEÇE,NEM,CEP"
];

rawLevels.sort((a, b) => {
    let wa = a.split(","), wb = b.split(",");
    if (wa.length !== wb.length) return wa.length - wb.length;
    return wa[0].length - wb[0].length;
});

const levels = rawLevels.map((raw, idx) => {
    let wordList = raw.split(",");
    let letters = computeRequiredLetters(wordList).sort(() => Math.random() - 0.5);
    return { levelName: idx + 1, letters, wordList };
});

// ── IZGARA ALGORİTMASI ────────────────────────────────────────────────────────
const GS = 30; // grid size sabiti

function isSubwordConflict(placed, word, sr, sc, dir) {
    for (let pw of placed) {
        if (pw.dir !== dir) continue;
        if (dir === 'H') {
            if (pw.row !== sr) continue;
            let pwStart=pw.col, pwEnd=pw.col+pw.word.length-1;
            let newStart=sc, newEnd=sc+word.length-1;
            if (newStart>=pwStart && newEnd<=pwEnd) return true;
            if (pwStart>=newStart && pwEnd<=newEnd) return true;
        } else {
            if (pw.col !== sc) continue;
            let pwStart=pw.row, pwEnd=pw.row+pw.word.length-1;
            let newStart=sr, newEnd=sr+word.length-1;
            if (newStart>=pwStart && newEnd<=pwEnd) return true;
            if (pwStart>=newStart && pwEnd<=newEnd) return true;
        }
    }
    return false;
}

function canPlace(board, word, sr, sc, dir, placed) {
    let er = sr + (dir==='V' ? word.length-1 : 0);
    let ec = sc + (dir==='H' ? word.length-1 : 0);
    if (sr<0||sc<0||er>=GS||ec>=GS) return false;
    // Başı ve sonu boş olmalı
    if (dir==='H') {
        if (sc>0 && board[sr][sc-1]!==null) return false;
        if (ec<GS-1 && board[sr][ec+1]!==null) return false;
    } else {
        if (sr>0 && board[sr-1][sc]!==null) return false;
        if (er<GS-1 && board[er+1][sc]!==null) return false;
    }
    let shared = 0;
    for (let i=0; i<word.length; i++) {
        let r = sr+(dir==='V'?i:0), c = sc+(dir==='H'?i:0);
        let ex = board[r][c];
        if (ex!==null) {
            if (ex!==word[i]) return false;
            shared++;
        } else {
            // Dik yönde bitişik harf var mı?
            if (dir==='H') {
                if (r>0 && board[r-1][c]!==null) return false;
                if (r<GS-1 && board[r+1][c]!==null) return false;
            } else {
                if (c>0 && board[r][c-1]!==null) return false;
                if (c<GS-1 && board[r][c+1]!==null) return false;
            }
        }
    }
    return shared>=1 && shared<word.length;
}

function buildGrid(wordsArray) {
    let board = Array(GS).fill(null).map(()=>Array(GS).fill(null));
    let placed = [], remaining = [...wordsArray];
    let first = remaining.shift();
    let r0=Math.floor(GS/2), c0=Math.floor(GS/2)-Math.floor(first.length/2);
    for (let i=0;i<first.length;i++) board[r0][c0+i]=first[i];
    placed.push({word:first,row:r0,col:c0,dir:'H'});

    let passes=6, changed=true;
    while (remaining.length>0 && changed && passes-->0) {
        changed=false;
        for (let i=remaining.length-1;i>=0;i--) {
            let word=remaining[i], best=null, bestScore=Infinity;
            for (let pw of placed) {
                let dirs = pw.dir==='H' ? ['V','H'] : ['H','V'];
                for (let nd of dirs) {
                    for (let wi=0;wi<word.length;wi++) {
                        for (let pi=0;pi<pw.word.length;pi++) {
                            if (pw.word[pi]!==word[wi]) continue;
                            let sr, sc;
                            if (nd==='V') {
                                sr = pw.row + (pw.dir==='V'?pi:0) - wi;
                                sc = pw.col + (pw.dir==='H'?pi:0);
                            } else {
                                sr = pw.row + (pw.dir==='V'?pi:0);
                                sc = pw.col + (pw.dir==='H'?pi:0) - wi;
                            }
                            if (!canPlace(board,word,sr,sc,nd,placed)) continue;
                            let score=Math.abs(sr-GS/2)+Math.abs(sc-GS/2);
                            if (score<bestScore){bestScore=score;best={sr,sc,dir:nd};}
                        }
                    }
                }
            }
            if (best) {
                for(let k=0;k<word.length;k++)
                    board[best.sr+(best.dir==='V'?k:0)][best.sc+(best.dir==='H'?k:0)]=word[k];
                placed.push({word,row:best.sr,col:best.sc,dir:best.dir});
                remaining.splice(i,1); changed=true;
            }
        }
    }
    if (!placed.length) return null;
    let minR=GS,maxR=0,minC=GS,maxC=0;
    placed.forEach(pw=>{
        let er=pw.row+(pw.dir==='V'?pw.word.length-1:0);
        let ec=pw.col+(pw.dir==='H'?pw.word.length-1:0);
        minR=Math.min(minR,pw.row);maxR=Math.max(maxR,er);
        minC=Math.min(minC,pw.col);maxC=Math.max(maxC,ec);
    });
    return {
        words:placed.map(pw=>({word:pw.word,row:pw.row-minR,col:pw.col-minC,dir:pw.dir})),
        rows:maxR-minR+1, cols:maxC-minC+1, placedCount:placed.length
    };
}

function generateBestCrossword(wordList) {
    let sorted=[...wordList].sort((a,b)=>b.length-a.length);
    let best=null;
    for (let attempt=0;attempt<150;attempt++) {
        let shuffled=[sorted[0],...[...sorted.slice(1)].sort(()=>Math.random()-0.5)];
        let result=buildGrid(shuffled);
        if (!result) continue;
        let complete=result.placedCount===wordList.length;
        let better=!best||result.placedCount>best.placedCount||
            (result.placedCount===best.placedCount&&result.rows*result.cols<best.rows*best.cols);
        if (better) best=result;
        if (complete) break;
    }
    if (!best||best.placedCount<wordList.length) return buildFallbackGrid(wordList);
    return best;
}

function buildFallbackGrid(words) {
    let result=[],row=0,maxLen=Math.max(...words.map(w=>w.length));
    words.forEach(word=>{result.push({word,row,col:0,dir:'H'});row+=2;});
    return{words:result,rows:row-1,cols:maxLen,placedCount:words.length};
}

// ── DOM ────────────────────────────────────────────────────────────────────────
const gridEl=document.getElementById("grid");
const gridContainerEl=document.getElementById("grid-container");
const wheelEl=document.getElementById("wheel-container");
const currentSelectionEl=document.getElementById("current-selection");
const ribbonContainerEl=document.getElementById("ribbon-container");
const ribbonTextEl=document.getElementById("ribbon-text");
const canvas=document.getElementById("line-canvas");
const ctx=canvas.getContext("2d");
const coinTextEl=document.getElementById("coin-text");

// ── BAŞLANGIÇ ──────────────────────────────────────────────────────────────────
window.onload=function(){
    setTimeout(()=>{
        document.getElementById('intro-screen').classList.add('hide');
        document.getElementById('main-menu').classList.remove('hide');
        updateTheme(0);
    },2500);
    document.getElementById("start-btn").onclick=startGame;
};

function startGame(e){
    if(e)e.preventDefault();
    initAudio();
    document.getElementById('main-menu').classList.add('hide');
    document.getElementById('game-container').classList.add('active');
    setupInputEvents();
    document.getElementById("hint-btn").onclick=useHint;
    document.getElementById("shuffle-btn").onclick=shuffleLetters;
    document.getElementById("next-level-btn").onclick=loadNextLevel;
    document.getElementById("dict-btn").onclick=openDictionary;
    document.getElementById("close-dict-btn").onclick=()=>document.getElementById("dict-modal").classList.remove('show');
    coinTextEl.innerText=coins;
    loadLevel(0);
    window.addEventListener("resize",()=>{if(currentLevelWords.length>0)adjustGridScale();});
}

function updateTheme(n){
    const bgs=["arka-plan-1.png","arka-plan-2.png","arka-plan-3.png","arka-plan-4.png"];
    let bg=n>0?bgs[Math.min(Math.ceil(n/25)-1,bgs.length-1)]:"glide.jpg";
    document.body.style.backgroundImage=`linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.7)),url('${bg}')`;
}

// ── LEVEL ──────────────────────────────────────────────────────────────────────
function loadLevel(index){
    if(index<0||index>=levels.length)index=0;
    currentLevelIndex=index;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let ld=levels[index];
    updateTheme(ld.levelName);
    currentLetters=[...ld.letters];
    foundWords=[];isLevelComplete=false;isLevelLoading=false;
    currentWordString="";selectedNodes=[];lastSelectionCount=0;
    currentSelectionEl.innerText="";currentSelectionEl.classList.remove("shake");
    let board=generateBestCrossword(ld.wordList);
    currentLevelWords=board.words;globalRows=board.rows;globalCols=board.cols;
    document.getElementById("level-indicator").innerText="Bölüm "+ld.levelName;
    adjustGridScale();createGrid(globalRows,globalCols,currentLevelWords);drawWheel();
}

function adjustGridScale(){
    if(!globalRows||!globalCols)return;
    let cw=gridContainerEl.clientWidth-20,ch=gridContainerEl.clientHeight-20,gap=5;
    let size=Math.max(18,Math.floor(Math.min(60,(cw-(globalCols-1)*gap)/globalCols,(ch-(globalRows-1)*gap)/globalRows)));
    document.documentElement.style.setProperty('--cell-size',size+'px');
    gridEl.style.gap=gap+'px';
    gridEl.style.gridTemplateColumns=`repeat(${globalCols},${size}px)`;
    gridEl.style.gridTemplateRows=`repeat(${globalRows},${size}px)`;
}

function createGrid(rows,cols,words){
    gridEl.innerHTML='';
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
        let cell=document.createElement("div");
        cell.className="cell empty";cell.id=`cell-${r}-${c}`;
        cell.style.animationDelay=`${(r+c)*0.03}s`;gridEl.appendChild(cell);
    }
    words.forEach(wd=>{
        for(let i=0;i<wd.word.length;i++){
            let r=wd.row+(wd.dir==='V'?i:0),c=wd.col+(wd.dir==='H'?i:0);
            let cell=document.getElementById(`cell-${r}-${c}`);
            if(cell){cell.classList.remove("empty");cell.dataset.letter=wd.word[i];cell.innerText=wd.word[i];}
        }
    });
}

// ── WHEEL ──────────────────────────────────────────────────────────────────────
function drawWheel(){
    document.querySelectorAll('.letter-node').forEach(el=>el.remove());
    wheelAngles=currentLetters.map((_,i)=>i);
    currentLetters.forEach(letter=>{
        let node=document.createElement("div");
        node.className="letter-node";node.innerText=letter;node.dataset.char=letter;
        wheelEl.appendChild(node);
    });
    updateWheelPositions();
}

function updateWheelPositions(){
    const total=currentLetters.length;
    const radius=total<=5?90:total<=6?85:total<=7?80:total<=8?75:68;
    const nodeSize=total<=6?54:total<=8?46:40;
    const fontSize=total<=6?28:total<=8?23:19;
    const cx=130,cy=130,step=(2*Math.PI)/total;
    document.querySelectorAll('.letter-node').forEach((node,i)=>{
        let angle=wheelAngles[i]*step-Math.PI/2;
        let x=cx+Math.cos(angle)*radius,y=cy+Math.sin(angle)*radius;
        node.dataset.x=x;node.dataset.y=y;
        node.style.left=x+'px';node.style.top=y+'px';
        node.style.width=nodeSize+'px';node.style.height=nodeSize+'px';
        node.style.fontSize=fontSize+'px';
    });
}

// ── GİRİŞ ──────────────────────────────────────────────────────────────────────
function setupInputEvents(){
    wheelEl.addEventListener("mousedown",handleStart);
    window.addEventListener("mousemove",handleMove);
    window.addEventListener("mouseup",handleEnd);
    wheelEl.addEventListener("touchstart",handleStart,{passive:false});
    window.addEventListener("touchmove",handleMove,{passive:false});
    window.addEventListener("touchend",handleEnd);
}

function handleStart(e){
    if(e.target.id==='shuffle-btn')return;
    initAudio();
    let cx=e.clientX??e.touches[0].clientX,cy=e.clientY??e.touches[0].clientY;
    let el=document.elementFromPoint(cx,cy);
    if(el&&el.classList.contains("letter-node")){
        e.preventDefault();isDragging=true;addNode(el);updatePointerPos(cx,cy);renderCanvas();
    }
}

function handleMove(e){
    if(!isDragging)return;
    e.preventDefault();
    let cx=e.clientX??(e.touches?.[0]?.clientX??0),cy=e.clientY??(e.touches?.[0]?.clientY??0);
    updatePointerPos(cx,cy);
    let el=document.elementFromPoint(cx,cy);
    if(el&&el.classList.contains("letter-node")){
        if(selectedNodes.length>1&&selectedNodes[selectedNodes.length-2]===el){
            selectedNodes.pop().classList.remove("selected");
            currentWordString=currentWordString.slice(0,-1);
            currentSelectionEl.innerText=currentWordString;lastSelectionCount--;
        } else addNode(el);
    }
    renderCanvas();
}

function handleEnd(){
    if(!isDragging)return;
    isDragging=false;
    let word=currentWordString,nodes=[...selectedNodes];
    selectedNodes.forEach(n=>n.classList.remove("selected"));
    selectedNodes=[];currentWordString="";
    ctx.clearRect(0,0,canvas.width,canvas.height);lastSelectionCount=0;
    try{checkWord(word,nodes);}catch(err){console.error(err);}
}

function addNode(node){
    if(selectedNodes.includes(node))return;
    selectedNodes.push(node);node.classList.add("selected");
    currentWordString+=node.dataset.char;currentSelectionEl.innerText=currentWordString;
    currentSelectionEl.classList.remove("shake");lastSelectionCount++;playSelectSound(lastSelectionCount);
}

function updatePointerPos(cx,cy){
    const rect=canvas.getBoundingClientRect();
    pointerPos.x=cx-rect.left;pointerPos.y=cy-rect.top;
}

function renderCanvas(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(!selectedNodes.length)return;
    ctx.lineWidth=12;ctx.lineCap="round";ctx.lineJoin="round";
    ctx.strokeStyle="rgba(1,41,255,0.85)";
    ctx.beginPath();
    ctx.moveTo(+selectedNodes[0].dataset.x,+selectedNodes[0].dataset.y);
    for(let i=1;i<selectedNodes.length;i++)ctx.lineTo(+selectedNodes[i].dataset.x,+selectedNodes[i].dataset.y);
    if(isDragging)ctx.lineTo(pointerPos.x,pointerPos.y);
    ctx.stroke();
}

// ── KELİME KONTROLÜ ────────────────────────────────────────────────────────────
function checkWord(word,sourceNodes){
    if(!word||word.length<2)return;
    let matched=currentLevelWords.find(w=>w.word===word);
    if(matched&&!foundWords.includes(word)){
        foundWords.push(word);coins+=word.length*10;coinTextEl.innerText=coins;
        playCorrectSound();showRibbonBanner("HARİKA!");revealWordAnimated(matched,sourceNodes);
    } else {
        playWrongSound();
        currentSelectionEl.innerText=word;currentSelectionEl.classList.add("shake");
        setTimeout(()=>{currentSelectionEl.innerText="";currentSelectionEl.classList.remove("shake");},600);
    }
}

function showRibbonBanner(text){
    ribbonTextEl.innerText=text;ribbonContainerEl.classList.add('show');
    setTimeout(()=>{ribbonContainerEl.classList.remove('show');checkLevelComplete();},1400);
}

function revealWordAnimated(wordData,sourceNodes){
    for(let i=0;i<wordData.word.length;i++){
        let r=wordData.row+(wordData.dir==='V'?i:0),c=wordData.col+(wordData.dir==='H'?i:0);
        let targetCell=document.getElementById(`cell-${r}-${c}`);
        if(!targetCell||targetCell.classList.contains("active"))continue;
        let delay=i*70, sn=sourceNodes?.[i];
        if(sn){
            let sRect=sn.getBoundingClientRect(),tRect=targetCell.getBoundingClientRect();
            let flyer=document.createElement("div");flyer.className="flying-letter";flyer.innerText=wordData.word[i];
            flyer.style.cssText=`left:${sRect.left}px;top:${sRect.top}px;`;document.body.appendChild(flyer);
            setTimeout(()=>{
                flyer.style.left=tRect.left+'px';flyer.style.top=tRect.top+'px';
                flyer.style.borderRadius='8px';flyer.style.width=tRect.width+'px';flyer.style.height=tRect.height+'px';
            },delay+30);
            setTimeout(()=>{
                flyer.remove();
                if(!targetCell.classList.contains("active")){targetCell.classList.add("active");playTileLandSound();}
            },delay+420);
        } else {
            setTimeout(()=>{
                if(!targetCell.classList.contains("active")){targetCell.classList.add("active");playTileLandSound();}
            },delay);
        }
    }
}

function checkLevelComplete(){
    if(foundWords.length>=currentLevelWords.length&&!isLevelComplete){
        isLevelComplete=true;
        setTimeout(()=>{
            let nextIdx=(currentLevelIndex+1)%levels.length;
            document.getElementById("next-level-btn").innerText=`Bölüm ${levels[nextIdx].levelName} ➔`;
            document.getElementById("success-modal").classList.add("show");
        },700);
    }
}

function loadNextLevel(){
    if(isLevelLoading)return;
    isLevelLoading=true;
    document.getElementById("success-modal").classList.remove("show");
    let nextIdx=(currentLevelIndex+1)%levels.length;
    setTimeout(()=>{loadLevel(nextIdx);isLevelLoading=false;},300);
}

function shuffleLetters(){
    initAudio();
    for(let i=wheelAngles.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[wheelAngles[i],wheelAngles[j]]=[wheelAngles[j],wheelAngles[i]];}
    updateWheelPositions();ctx.clearRect(0,0,canvas.width,canvas.height);
    currentWordString="";currentSelectionEl.innerText="";
    selectedNodes.forEach(n=>n.classList.remove("selected"));selectedNodes=[];isDragging=false;lastSelectionCount=0;
}

function useHint(){
    initAudio();
    const cost=50;
    if(coins<cost){alert("Yeterli elmasın yok! (50 💎 Gerekli)");playWrongSound();return;}
    let targetCell=null;
    // Önce yarı bulunmuş kelimelere bak
    for(let wd of currentLevelWords){
        if(foundWords.includes(wd.word))continue;
        for(let i=0;i<wd.word.length;i++){
            let r=wd.row+(wd.dir==='V'?i:0),c=wd.col+(wd.dir==='H'?i:0);
            let cell=document.getElementById(`cell-${r}-${c}`);
            if(cell&&!cell.classList.contains('active')){targetCell=cell;break;}
        }
        if(targetCell)break;
    }
    if(!targetCell){
        let hidden=Array.from(document.querySelectorAll('.cell:not(.empty):not(.active)'));
        if(hidden.length)targetCell=hidden[Math.floor(Math.random()*hidden.length)];
    }
    if(targetCell){
        coins-=cost;coinTextEl.innerText=coins;
        targetCell.classList.add("active");playCorrectSound();
        // Check if any unfound word now has all cells revealed
        checkHintWordCompletion();
        setTimeout(()=>checkLevelComplete(),150);
    }
}

function checkHintWordCompletion(){
    for(let wd of currentLevelWords){
        if(foundWords.includes(wd.word))continue;
        let allActive=true;
        for(let i=0;i<wd.word.length;i++){
            let r=wd.row+(wd.dir==='V'?i:0),c=wd.col+(wd.dir==='H'?i:0);
            let cell=document.getElementById(`cell-${r}-${c}`);
            if(!cell||!cell.classList.contains('active')){allActive=false;break;}
        }
        if(allActive) foundWords.push(wd.word);
    }
}

function openDictionary(){
    let container=document.getElementById("dict-list-container");
    container.innerHTML='';
    [...currentLevelWords].sort((a,b)=>b.word.length-a.word.length).forEach(wd=>{
        let found=foundWords.includes(wd.word);
        let div=document.createElement("div");
        div.className="dict-item"+(found?"":" blurred-item");
        div.innerHTML=`<div class="dict-word">${found?wd.word:"???"}</div>
                       <div class="dict-meaning">${found?(tdkDictionary[wd.word]||"Türkçe sözlükte yer alan anlamlı bir kelime."):"Kelimeyi bulduğunuzda anlamı burada görünecek."}</div>`;
        container.appendChild(div);
    });
    document.getElementById("dict-modal").classList.add('show');
}
